name: Update index

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.search.outputs.changed }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Cache semantic model
        uses: actions/cache@v4
        with:
          path: ~/.cache/xkcd-transformers
          key: xkcd-transformers-${{ runner.os }}-mini-lm-l6-v2

      - name: Install dependencies
        run: npm ci

      - name: Refresh public search index
        run: npm run update:index -- --recent-count=10

      - name: Check for search index changes
        id: search
        run: |
          if git diff --quiet -- public/search-index.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Rebuild semantic index and manifest
        if: steps.search.outputs.changed == 'true'
        run: npm run generate:semantic

      - name: Validate generated indexes
        if: steps.search.outputs.changed == 'true'
        run: npm run validate:index -- --require-semantic

      - name: Verify app
        if: steps.search.outputs.changed == 'true'
        run: npm run verify

      - name: Commit generated indexes
        if: steps.search.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/search-index.json public/semantic-index.json public/index-manifest.json
          git commit -m "Update generated xkcd search index"
          git push

      - name: Configure Pages
        if: steps.search.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.search.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: update
    if: needs.update.outputs.changed == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
